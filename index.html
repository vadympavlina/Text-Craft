<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TextCraft</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✍️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════ DESIGN TOKENS ═══════════ */
:root {
  --bg:         #f4f1ec;
  --paper:      #fffffe;
  --surface:    #ffffff;
  --border:     #e8e4dd;
  --border2:    #d4cfc8;
  --text:       #1c1917;
  --muted:      #78716c;
  --subtle:     #a8a29e;
  --accent:     #0f766e;
  --accent-h:   #0d6461;
  --accent-bg:  #f0fdf9;
  --accent-lt:  #ccfbf1;
  --r:          6px;
  --r-lg:       12px;
  --sh-sm:      0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh:         0 4px 20px rgba(0,0,0,.09),0 1px 4px rgba(0,0,0,.05);
  --sh-lg:      0 16px 56px rgba(0,0,0,.10),0 4px 16px rgba(0,0,0,.06);
  --topbar:     52px;
  --toolbar:    44px;
  --statusbar:  26px;
}

/* ═══════════ RESET ═══════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}

body {
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  height:100%;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ═══════════ TOP BAR ═══════════ */
.topbar {
  height:var(--topbar);
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 16px 0 18px;
  gap:10px;
  flex-shrink:0;
  box-shadow:var(--sh-sm);
  z-index:60;
}

.brand {
  display:flex;align-items:center;gap:8px;
  text-decoration:none;flex-shrink:0;
}
.brand-mark {
  width:30px;height:30px;
  background:linear-gradient(135deg,var(--accent),#14b8a6);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(15,118,110,.3);
}
.brand-mark svg{width:14px;height:14px;color:#fff}
.brand-name{
  font-size:15px;font-weight:600;
  color:var(--text);letter-spacing:-.3px;
}

.topbar-div{width:1px;height:22px;background:var(--border);flex-shrink:0}

.doc-name{
  border:none;outline:none;
  font-family:'Outfit',sans-serif;
  font-size:14px;font-weight:500;
  color:var(--text);
  background:transparent;
  padding:5px 8px;
  border-radius:var(--r);
  min-width:160px;max-width:300px;
  transition:background .15s,box-shadow .15s;
}
.doc-name:hover{background:var(--bg)}
.doc-name:focus{background:var(--bg);box-shadow:0 0 0 2px var(--accent-lt)}

.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:6px;flex-shrink:0}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  height:32px;padding:0 13px;
  border:none;border-radius:var(--r);
  font-family:'Outfit',sans-serif;
  font-size:13px;font-weight:500;
  cursor:pointer;
  transition:all .15s;
  white-space:nowrap;
}
.btn svg{width:13px;height:13px;flex-shrink:0}
.btn-ghost{background:transparent;color:var(--muted)}
.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-outline{
  background:transparent;color:var(--accent);
  border:1.5px solid #b2f5ea;
}
.btn-outline:hover{background:var(--accent-bg);border-color:var(--accent)}
.btn-solid{background:var(--accent);color:#fff}
.btn-solid:hover{background:var(--accent-h)}
.btn-solid:active{transform:scale(.97)}

/* ═══════════ TOOLBAR ═══════════ */
.toolbar {
  height:var(--toolbar);
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 10px;
  gap:1px;
  flex-shrink:0;
  overflow-x:auto;
  scrollbar-width:none;
  z-index:55;
}
.toolbar::-webkit-scrollbar{display:none}

.tb-sep{width:1px;height:20px;background:var(--border);margin:0 4px;flex-shrink:0}

/* Tool button */
.tb{
  width:30px;height:30px;
  border:none;border-radius:var(--r);
  background:transparent;
  cursor:pointer;
  color:var(--text);
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,color .12s;
  flex-shrink:0;
  position:relative;
}
.tb:hover{background:var(--bg)}
.tb.on{background:var(--accent-lt);color:var(--accent)}
.tb svg{width:15px;height:15px;pointer-events:none}

/* Style select */
.tb-select{
  height:30px;
  border:1.5px solid var(--border);
  border-radius:var(--r);
  background:var(--surface);
  font-family:'Outfit',sans-serif;
  font-size:12.5px;font-weight:500;
  color:var(--text);
  padding:0 8px;
  cursor:pointer;
  outline:none;
  transition:border-color .15s;
  flex-shrink:0;
}
.tb-select:hover,.tb-select:focus{border-color:var(--accent)}
#blockStyle{min-width:108px}
#fontFam{min-width:116px}

/* Font size control */
.size-ctrl{
  display:flex;align-items:center;
  border:1.5px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  height:30px;flex-shrink:0;
  transition:border-color .15s;
}
.size-ctrl:focus-within{border-color:var(--accent)}
.size-btn{
  width:22px;height:28px;
  border:none;background:var(--bg);
  cursor:pointer;font-size:15px;line-height:1;
  color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,color .12s;
  flex-shrink:0;
  user-select:none;
}
.size-btn:hover{background:var(--border2);color:var(--text)}
.size-inp{
  width:34px;height:28px;
  border:none;
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
  outline:none;
  text-align:center;
  font-family:'Outfit',sans-serif;
  font-size:12.5px;color:var(--text);
  background:var(--surface);
  -moz-appearance:textfield;
}
.size-inp::-webkit-inner-spin-button,
.size-inp::-webkit-outer-spin-button{-webkit-appearance:none}

/* Color picker button */
.col-btn{
  width:30px;height:30px;
  border:none;border-radius:var(--r);
  background:transparent;
  cursor:pointer;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;
  transition:background .12s;
  flex-shrink:0;
  position:relative;
}
.col-btn:hover{background:var(--bg)}
.col-btn svg{width:14px;height:14px;pointer-events:none}
.col-bar{width:16px;height:3px;border-radius:2px;pointer-events:none}
.col-btn input[type=color]{
  position:absolute;opacity:0;
  width:0;height:0;pointer-events:none;
}

/* Tooltip */
[data-tip]{position:relative}
[data-tip]::after{
  content:attr(data-tip);
  position:absolute;
  bottom:calc(100% + 7px);left:50%;
  transform:translateX(-50%);
  background:#1c1917;color:#fff;
  font-family:'Outfit',sans-serif;
  font-size:11px;font-weight:400;
  padding:3px 8px;border-radius:4px;
  white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .15s .1s;
  z-index:999;
}
[data-tip]:hover::after{opacity:1}

/* ═══════════ SCROLL + PAGE ═══════════ */
.scroll-area{
  flex:1;
  overflow-y:auto;
  padding:32px 20px calc(var(--statusbar) + 36px);
  background:var(--bg);
  background-image:
    radial-gradient(circle,rgba(180,174,166,.35) 1px,transparent 1px);
  background-size:22px 22px;
}

.page{
  width:100%;max-width:752px;
  margin:0 auto;
  background:var(--paper);
  border-radius:var(--r);
  box-shadow:var(--sh-lg),0 0 0 1px rgba(0,0,0,.03);
  padding:76px 84px 100px;
  position:relative;
  transition:box-shadow .25s;
}
/* Accent bar on top */
.page::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),#14b8a6,#38bdf8);
  border-radius:var(--r) var(--r) 0 0;
}

/* ContentEditable */
.editor{
  outline:none;
  min-height:200px;
  font-family:'Lora',serif;
  font-size:16px;
  line-height:1.85;
  color:var(--text);
  caret-color:var(--accent);
  word-break:break-word;
}
.editor:empty::before{
  content:'Почніть вводити текст…';
  color:#ccc8c2;
  pointer-events:none;
  display:block;
}

/* Rich text content */
.editor h1{font-family:'Lora',serif;font-size:2.15em;font-weight:700;line-height:1.2;margin:.1em 0 .5em;color:#0f172a;letter-spacing:-.5px}
.editor h2{font-family:'Lora',serif;font-size:1.5em;font-weight:600;line-height:1.3;margin:.8em 0 .4em}
.editor h3{font-family:'Lora',serif;font-size:1.2em;font-weight:600;line-height:1.4;margin:.6em 0 .3em}
.editor p{margin-bottom:.5em}
.editor ul,.editor ol{padding-left:1.6em;margin-bottom:.6em}
.editor li{margin-bottom:.25em}
.editor blockquote{
  border-left:3px solid var(--accent);
  padding:8px 18px;margin:1em 0;
  color:var(--muted);font-style:italic;
  background:var(--accent-bg);
  border-radius:0 var(--r) var(--r) 0;
}
.editor a{color:var(--accent);text-decoration:underline}
.editor code{
  background:var(--bg);border-radius:4px;
  padding:2px 5px;
  font-family:'Courier New',monospace;font-size:.9em;
}
.editor pre{
  background:var(--bg);border-radius:var(--r);
  padding:14px 18px;margin:.8em 0;
  font-family:'Courier New',monospace;font-size:.9em;
  white-space:pre-wrap;border:1px solid var(--border);
}
.editor hr{border:none;border-top:1.5px solid var(--border);margin:1.5em 0}

/* ═══════════ STATUS BAR ═══════════ */
.statusbar{
  height:var(--statusbar);
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 16px;gap:16px;
  font-size:11.5px;color:var(--subtle);
  flex-shrink:0;z-index:60;
}
.sb-dot{
  width:5px;height:5px;border-radius:50%;
  background:#22c55e;display:inline-block;margin-right:4px;
}
.sb-right{margin-left:auto}

/* ═══════════ OVERLAY ═══════════ */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.38);
  backdrop-filter:blur(5px);
  z-index:9999;
  align-items:center;justify-content:center;
}
.overlay.show{display:flex}
.ov-card{
  background:var(--surface);
  border-radius:var(--r-lg);
  padding:36px 44px;
  text-align:center;
  box-shadow:var(--sh-lg);
  animation:popIn .2s ease;
}
@keyframes popIn{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
.spin{
  width:44px;height:44px;margin:0 auto 14px;
  border:3px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.ov-card strong{font-size:15px;font-weight:600;display:block;margin-bottom:4px}
.ov-card span{font-size:13px;color:var(--muted)}

/* ═══════════ FADE IN ═══════════ */
body{animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

@media(max-width:680px){
  .page{padding:40px 22px 60px}
  .scroll-area{padding:14px 6px 48px}
}
</style>
</head>
<body>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="ov-card">
    <div class="spin"></div>
    <strong>Генерація PDF</strong>
    <span>Будь ласка, зачекайте…</span>
  </div>
</div>

<!-- TOP BAR -->
<header class="topbar">
  <a class="brand" href="#">
    <div class="brand-mark">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7">
        <path d="M2 14l3.5-1.5 7-7-2-2-7 7L2 14z"/>
        <path d="M10.5 3.5l2 2"/>
        <path d="M12 2l2 2-1 1-2-2 1-1z"/>
      </svg>
    </div>
    <span class="brand-name">TextCraft</span>
  </a>
  <div class="topbar-div"></div>
  <input class="doc-name" id="docTitle" value="Без назви" />
  <div class="topbar-actions">
    <button class="btn btn-ghost" onclick="clearDoc()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M2 4h12M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1M6 7v5M10 7v5M3 4l.8 9a1 1 0 001 .9h6.4a1 1 0 001-.9L13 4"/>
      </svg>
      Очистити
    </button>
    <button class="btn btn-outline" onclick="exportHTML()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M4 2h8l3 3v9a1 1 0 01-1 1H4a1 1 0 01-1-1V3a1 1 0 011-1z"/>
        <path d="M12 2v4h3M8 7v5M6 10l2 2 2-2"/>
      </svg>
      HTML
    </button>
    <button class="btn btn-solid" onclick="exportPDF()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M4 2h8l3 3v9a1 1 0 01-1 1H4a1 1 0 01-1-1V3a1 1 0 011-1z"/>
        <path d="M12 2v4h3M8 7v5M6 10l2 2 2-2"/>
      </svg>
      Зберегти PDF
    </button>
  </div>
</header>

<!-- TOOLBAR -->
<div class="toolbar">

  <!-- Paragraph style -->
  <select class="tb-select" id="blockStyle" onchange="applyBlock(this.value)" data-tip="Стиль абзацу">
    <option value="p">Звичайний</option>
    <option value="h1">Заголовок 1</option>
    <option value="h2">Заголовок 2</option>
    <option value="h3">Заголовок 3</option>
    <option value="blockquote">Цитата</option>
    <option value="pre">Код</option>
  </select>

  <div class="tb-sep"></div>

  <!-- Font family -->
  <select class="tb-select" id="fontFam" onchange="applyFontFam(this.value)" data-tip="Шрифт">
    <option value="'Lora',serif">Lora (Serif)</option>
    <option value="'Outfit',sans-serif">Outfit (Sans)</option>
    <option value="Georgia,serif">Georgia</option>
    <option value="'Times New Roman',serif">Times New Roman</option>
    <option value="'Courier New',monospace">Courier New</option>
    <option value="Verdana,sans-serif">Verdana</option>
    <option value="Garamond,serif">Garamond</option>
  </select>

  <div class="tb-sep"></div>

  <!-- Font size -->
  <div class="size-ctrl">
    <button class="size-btn" onclick="changeSize(-1)" data-tip="Менше">−</button>
    <input class="size-inp" type="number" id="fontSize" value="16" min="6" max="144"
           onchange="applyFontSize(parseInt(this.value)||16)" />
    <button class="size-btn" onclick="changeSize(+1)" data-tip="Більше">+</button>
  </div>

  <div class="tb-sep"></div>

  <!-- Bold -->
  <button class="tb" id="btn-bold" onclick="exec('bold')" data-tip="Жирний (Ctrl+B)">
    <svg viewBox="0 0 16 16" fill="currentColor">
      <path d="M4.5 2h4A3 3 0 0112 5a3 3 0 01-2.2 2.9A3.5 3.5 0 0113 11.5 3.5 3.5 0 019.5 15H4.5V2zm2 5h1.5a1.5 1.5 0 000-3H6.5v3zm0 5.5h2.5a1.5 1.5 0 000-3H6.5v3z"/>
    </svg>
  </button>

  <!-- Italic -->
  <button class="tb" id="btn-italic" onclick="exec('italic')" data-tip="Курсив (Ctrl+I)">
    <svg viewBox="0 0 16 16" fill="currentColor">
      <path d="M6 2h6v2H9.9L7.1 12H9v2H3v-2h2.1L7.9 4H6V2z"/>
    </svg>
  </button>

  <!-- Underline -->
  <button class="tb" id="btn-underline" onclick="exec('underline')" data-tip="Підкреслення (Ctrl+U)">
    <svg viewBox="0 0 16 16" fill="currentColor">
      <path d="M4 2v5a4 4 0 008 0V2h-2v5a2 2 0 01-4 0V2H4zM2 13.5h12V15H2v-1.5z"/>
    </svg>
  </button>

  <!-- Strikethrough -->
  <button class="tb" id="btn-strikeThrough" onclick="exec('strikeThrough')" data-tip="Закреслення">
    <svg viewBox="0 0 16 16" fill="currentColor">
      <path d="M1.5 8.5h13v1h-13v-1z"/>
      <path d="M8 3.5A2.5 2.5 0 005.5 6H4A4 4 0 018 2a4 4 0 014 4h-1.5A2.5 2.5 0 008 3.5zM5.5 10A2.5 2.5 0 008 12.5 2.5 2.5 0 0010.5 10H12a4 4 0 01-4 4 4 4 0 01-4-4h1.5z"/>
    </svg>
  </button>

  <!-- Superscript -->
  <button class="tb" id="btn-superscript" onclick="exec('superscript')" data-tip="Верхній індекс">
    <svg viewBox="0 0 16 16" fill="currentColor">
      <path d="M1.5 13L5.3 8 1.5 3h2l2.6 3.5L8.7 3h2L7 8l3.7 5h-2L6.1 9.5 3.5 13h-2zM11.5 1.5h3.5v1H13v.6h2v1h-2v.6h2v1h-3.5v-4.2z"/>
    </svg>
  </button>

  <!-- Subscript -->
  <button class="tb" id="btn-subscript" onclick="exec('subscript')" data-tip="Нижній індекс">
    <svg viewBox="0 0 16 16" fill="currentColor">
      <path d="M1.5 3L5.3 8 1.5 13h2l2.6-3.5L8.7 13h2L7 8l3.7-5h-2L6.1 6.5 3.5 3h-2zM11.5 9.5H15v1h-2v.6h2v1h-2v.6h2v1h-3.5V9.5z"/>
    </svg>
  </button>

  <div class="tb-sep"></div>

  <!-- Text color -->
  <button class="col-btn" onclick="document.getElementById('pickTxt').click()" data-tip="Колір тексту">
    <svg viewBox="0 0 16 16" fill="currentColor">
      <path d="M8 1L2 15h2.2l1.5-4h4.6l1.5 4H14L8 1zm-1.6 9L8 5.2l1.6 4.8H6.4z"/>
    </svg>
    <div class="col-bar" id="barTxt" style="background:#1c1917"></div>
    <input type="color" id="pickTxt" value="#1c1917" oninput="applyTxtColor(this.value)">
  </button>

  <!-- Highlight -->
  <button class="col-btn" onclick="document.getElementById('pickHL').click()" data-tip="Виділення">
    <svg viewBox="0 0 16 16" fill="currentColor">
      <path d="M1 14l3.5-3.5 7.5-7.5 2 2-7.5 7.5L3 15H1v-1zm11.5-11l1-1 1 1-1 1-1-1z"/>
    </svg>
    <div class="col-bar" id="barHL" style="background:#fde68a"></div>
    <input type="color" id="pickHL" value="#fde68a" oninput="applyHL(this.value)">
  </button>

  <div class="tb-sep"></div>

  <!-- Align left -->
  <button class="tb" onclick="exec('justifyLeft')" data-tip="По лівому краю">
    <svg viewBox="0 0 16 16" fill="currentColor">
      <path d="M2 3h12v1.4H2V3zm0 3.3h8v1.4H2V6.3zm0 3.4h12v1.4H2V9.7zm0 3.3h8v1.4H2v-1.4z"/>
    </svg>
  </button>
  <!-- Align center -->
  <button class="tb" onclick="exec('justifyCenter')" data-tip="По центру">
    <svg viewBox="0 0 16 16" fill="currentColor">
      <path d="M2 3h12v1.4H2V3zm2 3.3h8v1.4H4V6.3zm-2 3.4h12v1.4H2V9.7zm2 3.3h8v1.4H4v-1.4z"/>
    </svg>
  </button>
  <!-- Align right -->
  <button class="tb" onclick="exec('justifyRight')" data-tip="По правому краю">
    <svg viewBox="0 0 16 16" fill="currentColor">
      <path d="M2 3h12v1.4H2V3zm4 3.3h8v1.4H6V6.3zm-4 3.4h12v1.4H2V9.7zm4 3.3h8v1.4H6v-1.4z"/>
    </svg>
  </button>
  <!-- Justify -->
  <button class="tb" onclick="exec('justifyFull')" data-tip="По ширині">
    <svg viewBox="0 0 16 16" fill="currentColor">
      <path d="M2 3h12v1.4H2V3zm0 3.3h12v1.4H2V6.3zm0 3.4h12v1.4H2V9.7zm0 3.3h12v1.4H2v-1.4z"/>
    </svg>
  </button>

  <div class="tb-sep"></div>

  <!-- UL -->
  <button class="tb" onclick="exec('insertUnorderedList')" data-tip="Маркований список">
    <svg viewBox="0 0 16 16" fill="currentColor">
      <circle cx="2.5" cy="4" r="1.3"/>
      <path d="M5.5 3.3h9v1.4h-9V3.3z"/>
      <circle cx="2.5" cy="8" r="1.3"/>
      <path d="M5.5 7.3h9v1.4h-9V7.3z"/>
      <circle cx="2.5" cy="12" r="1.3"/>
      <path d="M5.5 11.3h9v1.4h-9v-1.4z"/>
    </svg>
  </button>

  <!-- OL -->
  <button class="tb" onclick="exec('insertOrderedList')" data-tip="Нумерований список">
    <svg viewBox="0 0 16 16" fill="currentColor">
      <path d="M1.5 2h1.3v4H1.5V2zm-1 3.3h3.3v1H.5v-1zM6 3.3h9v1.4H6V3.3zM6 7.3h9v1.4H6V7.3zM1 9h2.3v.5H1.8a.8.8 0 00-.8.8.8.8 0 00.8.8h1.5v.5H1v1h3.3V9H1zm5 2.3h9v1.4H6v-1.4z"/>
    </svg>
  </button>

  <div class="tb-sep"></div>

  <!-- Indent / Outdent -->
  <button class="tb" onclick="exec('indent')" data-tip="Збільшити відступ">
    <svg viewBox="0 0 16 16" fill="currentColor">
      <path d="M2 3h12v1.4H2V3zm4 3.3h8v1.4H6V6.3zm-4 3.4h12v1.4H2V9.7zm4 3.3h8v1.4H6v-1.4zM1 6l3 2-3 2V6z"/>
    </svg>
  </button>
  <button class="tb" onclick="exec('outdent')" data-tip="Зменшити відступ">
    <svg viewBox="0 0 16 16" fill="currentColor">
      <path d="M2 3h12v1.4H2V3zm4 3.3h8v1.4H6V6.3zm-4 3.4h12v1.4H2V9.7zm4 3.3h8v1.4H6v-1.4zM5 6l-3 2 3 2V6z"/>
    </svg>
  </button>

  <div class="tb-sep"></div>

  <!-- Link -->
  <button class="tb" onclick="insertLink()" data-tip="Вставити посилання">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M6.5 9.5a3.5 3.5 0 005 0l2-2a3.5 3.5 0 00-5-5L7 4"/>
      <path d="M9.5 6.5a3.5 3.5 0 00-5 0l-2 2a3.5 3.5 0 005 5L9 12"/>
    </svg>
  </button>

  <!-- HR -->
  <button class="tb" onclick="exec('insertHorizontalRule')" data-tip="Горизонтальна лінія">
    <svg viewBox="0 0 16 16" fill="currentColor">
      <path d="M1 7.5h14v1H1z"/>
      <rect x="4" y="3.5" width="1" height="9" rx=".5" opacity=".3"/>
      <rect x="11" y="3.5" width="1" height="9" rx=".5" opacity=".3"/>
    </svg>
  </button>

  <!-- Remove format -->
  <button class="tb" onclick="exec('removeFormat')" data-tip="Очистити форматування">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M3 3l10 10"/>
      <path d="M9 2l-4 12M6 2h7M3 14h5"/>
    </svg>
  </button>

  <div class="tb-sep"></div>

  <!-- Undo / Redo -->
  <button class="tb" onclick="exec('undo')" data-tip="Скасувати (Ctrl+Z)">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7">
      <path d="M3 6.5h6a4 4 0 014 4 4 4 0 01-4 4H6"/>
      <path d="M3 3.5L1 6.5l2 3"/>
    </svg>
  </button>
  <button class="tb" onclick="exec('redo')" data-tip="Повторити (Ctrl+Y)">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7">
      <path d="M13 6.5H7a4 4 0 00-4 4 4 4 0 004 4h3"/>
      <path d="M13 3.5l2 3-2 3"/>
    </svg>
  </button>

</div>

<!-- EDITOR SCROLL -->
<div class="scroll-area" id="scrollArea">
  <div class="page" id="page">
    <div class="editor" id="editor" contenteditable="true" spellcheck="true"></div>
  </div>
</div>

<!-- STATUS BAR -->
<footer class="statusbar">
  <span><span class="sb-dot"></span>Збережено</span>
  <span id="sb-w">Слів: 0</span>
  <span id="sb-c">Символів: 0</span>
  <span class="sb-right" id="sb-p">Стор. ~1</span>
</footer>

<script>
/* ── STATE ── */
const editor = document.getElementById('editor');
let saveTimer;

/* ── execCommand ── */
function exec(cmd, val = null) {
  editor.focus();
  document.execCommand(cmd, false, val);
  syncState();
  tick();
}

/* ── BLOCK STYLE ── */
function applyBlock(tag) {
  editor.focus();
  document.execCommand('formatBlock', false, tag);
  syncState();
}

/* ── FONT FAMILY ── */
function applyFontFam(fam) {
  editor.focus();
  wrapStyle('fontFamily', fam);
  syncState();
}

/* ── FONT SIZE ── */
function changeSize(d) {
  const el = document.getElementById('fontSize');
  const v = Math.min(144, Math.max(6, (parseInt(el.value) || 16) + d));
  el.value = v;
  applyFontSize(v);
}
function applyFontSize(px) {
  editor.focus();
  wrapStyle('fontSize', px + 'px');
}

/* ── COLORS ── */
function applyTxtColor(c) {
  document.getElementById('barTxt').style.background = c;
  editor.focus();
  document.execCommand('foreColor', false, c);
}
function applyHL(c) {
  document.getElementById('barHL').style.background = c;
  editor.focus();
  document.execCommand('hiliteColor', false, c);
}

/* ── WRAP SELECTION WITH SPAN STYLE ── */
function wrapStyle(prop, val) {
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  if (range.collapsed) return;

  const span = document.createElement('span');
  span.style[prop] = val;
  try {
    range.surroundContents(span);
  } catch(e) {
    const frag = range.extractContents();
    span.appendChild(frag);
    range.insertNode(span);
  }
  sel.removeAllRanges();
  const r2 = document.createRange();
  r2.selectNodeContents(span);
  sel.addRange(r2);
  tick();
}

/* ── LINK ── */
function insertLink() {
  const url = prompt('URL посилання:');
  if (url && url.trim()) {
    exec('createLink', url.trim());
    editor.querySelectorAll('a').forEach(a => {
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
    });
  }
}

/* ── SYNC TOOLBAR STATE ── */
function syncState() {
  ['bold','italic','underline','strikeThrough','superscript','subscript'].forEach(cmd => {
    const b = document.getElementById('btn-' + cmd);
    if (b) b.classList.toggle('on', document.queryCommandState(cmd));
  });

  try {
    const bv = document.queryCommandValue('formatBlock').toLowerCase().replace(/[<>]/g,'');
    const map = {p:'p',h1:'h1',h2:'h2',h3:'h3',blockquote:'blockquote',pre:'pre'};
    document.getElementById('blockStyle').value = map[bv] || 'p';
  } catch(e) {}

  try {
    const sel = window.getSelection();
    if (sel && sel.rangeCount) {
      const node = sel.getRangeAt(0).startContainer;
      const el = node.nodeType === 3 ? node.parentElement : node;
      if (el && editor.contains(el)) {
        const fs = parseInt(getComputedStyle(el).fontSize);
        if (fs > 0) document.getElementById('fontSize').value = fs;
      }
    }
  } catch(e) {}
}

/* ── STATUS ── */
function tick() {
  const t = editor.innerText || '';
  const w = t.trim() === '' ? 0 : t.trim().split(/\s+/).length;
  const c = t.replace(/\n/g,'').length;
  document.getElementById('sb-w').textContent = 'Слів: ' + w;
  document.getElementById('sb-c').textContent = 'Символів: ' + c;
  document.getElementById('sb-p').textContent = 'Стор. ~' + Math.max(1, Math.ceil(w / 500));
  save();
}

/* ── AUTO SAVE ── */
function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem('tc2_html', editor.innerHTML);
      localStorage.setItem('tc2_name', document.getElementById('docTitle').value);
    } catch(e) {}
  }, 900);
}

function loadSaved() {
  try {
    const h = localStorage.getItem('tc2_html');
    const n = localStorage.getItem('tc2_name');
    if (h) editor.innerHTML = h;
    if (n) document.getElementById('docTitle').value = n;
  } catch(e) {}
  tick();
}

/* ── CLEAR ── */
function clearDoc() {
  if (!confirm('Очистити весь документ?')) return;
  editor.innerHTML = '';
  try { localStorage.removeItem('tc2_html'); } catch(e) {}
  tick();
  editor.focus();
}

/* ── EXPORT HTML ── */
function exportHTML() {
  const name = document.getElementById('docTitle').value || 'document';
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const html = `<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>${esc(name)}</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
body{font-family:'Lora',serif;font-size:16px;line-height:1.85;color:#1c1917;max-width:720px;margin:60px auto;padding:0 40px}
h1{font-size:2.15em;font-weight:700;line-height:1.2;margin:.1em 0 .5em}
h2{font-size:1.5em;font-weight:600;margin:.8em 0 .4em}
h3{font-size:1.2em;font-weight:600;margin:.6em 0 .3em}
blockquote{border-left:3px solid #0f766e;padding:8px 18px;margin:1em 0;color:#78716c;font-style:italic;background:#f0fdf9;border-radius:0 6px 6px 0}
a{color:#0f766e}
code,pre{background:#f4f1ec;border-radius:4px;padding:2px 6px;font-family:monospace;font-size:.9em}
hr{border:none;border-top:1.5px solid #e8e4dd;margin:1.5em 0}
</style></head>
<body>${editor.innerHTML}</body></html>`;
  dl(name + '.html', html, 'text/html');
}

/* ── EXPORT PDF ── */
async function exportPDF() {
  const ov = document.getElementById('overlay');
  ov.classList.add('show');

  try {
    if (!window.html2pdf) {
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js');
    }

    const name = document.getElementById('docTitle').value || 'document';

    const wrap = document.createElement('div');
    wrap.style.cssText = `
      position:fixed;top:0;left:0;
      width:210mm;
      padding:20mm 20mm;
      background:#fff;
      font-family:Georgia,serif;
      font-size:13px;
      line-height:1.8;
      color:#1c1917;
      word-break:break-word;
      box-sizing:border-box;
      z-index:1;
    `;
    wrap.innerHTML = editor.innerHTML;
    document.body.appendChild(wrap);

    await new Promise(r => setTimeout(r, 300));

    await html2pdf()
      .set({
        margin: 0,
        filename: name + '.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: {
          scale: 2,
          useCORS: true,
          logging: false,
          scrollX: 0,
          scrollY: 0,
          width: wrap.offsetWidth,
          windowWidth: wrap.offsetWidth,
        },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak: { mode: 'css' },
      })
      .from(wrap)
      .save();

    wrap.remove();
  } catch(err) {
    alert('Помилка PDF: ' + err.message);
  }

  ov.classList.remove('show');
}

function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

function dl(name, content, type) {
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([content], {type})),
    download: name
  });
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}

/* ── EVENTS ── */
editor.addEventListener('input', tick);
editor.addEventListener('mouseup', syncState);
editor.addEventListener('keyup', syncState);
editor.addEventListener('keydown', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  const k = e.key.toLowerCase();
  if (k === 'b') { e.preventDefault(); exec('bold'); }
  if (k === 'i') { e.preventDefault(); exec('italic'); }
  if (k === 'u') { e.preventDefault(); exec('underline'); }
  if (k === 'z' || k === 'y') setTimeout(syncState, 60);
});

document.getElementById('scrollArea').addEventListener('click', e => {
  if (!e.target.closest('.editor')) editor.focus();
});

document.getElementById('docTitle').addEventListener('input', save);

/* ── INIT ── */
loadSaved();
editor.focus();
</script>
</body>
</html>
