<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TextCraft</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%234F6BF4'/%3E%3Cpath d='M8 10h16M8 14h12M8 18h14M8 22h10' stroke='white' stroke-width='2' stroke-linecap='round'/%3E%3Cpath d='M20 20l4-4 2 2-4 4-2-2z' fill='white' opacity='0.9'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
/* ═══════════ DESIGN TOKENS ═══════════ */
:root {
  --bg:         #f0f2f5;
  --paper:      #ffffff;
  --surface:    #ffffff;
  --border:     #e2e5ea;
  --border2:    #d0d5dd;
  --text:       #1a1d23;
  --muted:      #4b5563;
  --subtle:     #9ca3af;
  --accent:     #4F6BF4;
  --accent-h:   #3d57e0;
  --accent-bg:  #eef0fe;
  --accent-lt:  #c7d0fc;
  --r:          7px;
  --r-lg:       13px;
  --sh-sm:      0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --sh:         0 4px 16px rgba(0,0,0,.09),0 1px 4px rgba(0,0,0,.05);
  --sh-lg:      0 16px 48px rgba(0,0,0,.10),0 4px 16px rgba(0,0,0,.06);
  --topbar:     52px;
  --toolbar:    44px;
  --statusbar:  26px;
}

/* ═══════════ RESET ═══════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}

body {
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  height:100%;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ═══════════ TOP BAR ═══════════ */
.topbar {
  height:var(--topbar);
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 12px 0 14px;
  gap:8px;
  flex-shrink:0;
  box-shadow:var(--sh-sm);
  z-index:60;
  min-width:0;
}

.brand {
  display:flex;align-items:center;gap:8px;
  text-decoration:none;flex-shrink:0;
}
.brand-mark {
  width:30px;height:30px;
  background:var(--accent);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(79,107,244,.3);
  flex-shrink:0;
}
.brand-mark svg{width:14px;height:14px;color:#fff}
.brand-name{
  font-size:15px;font-weight:700;
  color:var(--text);letter-spacing:-.3px;
}

.topbar-div{width:1px;height:22px;background:var(--border);flex-shrink:0}

/* Document title — grows to fill space */
.doc-name-wrap {
  flex:1; min-width:60px; max-width:260px;
  display:flex; align-items:center;
}
.doc-name{
  border:none;outline:none;
  font-family:'Inter',system-ui,sans-serif;
  font-size:13.5px;font-weight:500;
  color:var(--text);
  background:transparent;
  padding:5px 8px;
  border-radius:var(--r);
  width:100%;
  transition:background .15s,box-shadow .15s;
  min-width:0;
}
.doc-name:hover{background:var(--bg)}
.doc-name:focus{background:var(--bg);box-shadow:0 0 0 2px rgba(79,107,244,.2)}

/* Right-side action group */
.topbar-actions{
  margin-left:auto;
  display:flex;align-items:center;gap:4px;
  flex-shrink:0;
}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:5px;
  height:32px;padding:0 11px;
  border:1px solid transparent;border-radius:var(--r);
  font-family:'Inter',system-ui,sans-serif;
  font-size:13px;font-weight:500;
  cursor:pointer;
  transition:all .13s;
  white-space:nowrap;
  flex-shrink:0;
}
.btn svg{width:13px;height:13px;flex-shrink:0}
/* Icon-only variant for small screens */
.btn .btn-label { display:inline; }
.btn-ghost{background:transparent;color:var(--muted);border-color:transparent}
.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-icon {
  /* square icon-only button */
  width:32px;padding:0;justify-content:center;
}
.btn-outline{
  background:var(--accent-bg);color:var(--accent);
  border-color:var(--accent-lt);
}
.btn-outline:hover{background:#dde3fd;border-color:var(--accent)}
.btn-solid{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 6px rgba(79,107,244,.25)}
.btn-solid:hover{background:var(--accent-h);border-color:var(--accent-h)}
.btn-solid:active{transform:scale(.97)}

/* Hamburger menu for topbar overflow on mobile */
.topbar-menu-btn {
  display:none;
  width:34px;height:34px;
  border:1px solid var(--border);border-radius:var(--r);
  background:var(--surface);cursor:pointer;
  color:var(--muted);
  align-items:center;justify-content:center;
  flex-shrink:0;
  transition:background .12s,color .12s;
}
.topbar-menu-btn:hover{background:var(--bg);color:var(--text)}
.topbar-menu-btn svg{width:15px;height:15px;pointer-events:none}

/* Dropdown from hamburger */
.topbar-dropdown {
  display:none;
  position:absolute;
  top:calc(var(--topbar) + 4px);
  right:10px;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:var(--r-lg);
  box-shadow:var(--sh-lg);
  padding:6px;
  z-index:500;
  min-width:190px;
  flex-direction:column;
  gap:2px;
  animation:popIn .15s ease;
}
.topbar-dropdown.open { display:flex; }
.topbar-dropdown .btn {
  width:100%;justify-content:flex-start;
  height:36px;border-radius:var(--r);
  padding:0 10px;
}
.topbar-dropdown .btn .btn-label { display:inline !important; }
.topbar-dd-sep { height:1px;background:var(--border);margin:3px 0; }

/* ═══════════ TOOLBAR ═══════════ */
.toolbar-wrap {
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  z-index:55;
  position:relative;
}

.toolbar {
  display:flex;
  align-items:center;
  padding:0 6px;
  gap:1px;
  height:var(--toolbar);
  overflow-x:auto;
  overflow-y:hidden;
  scrollbar-width:none;
  -ms-overflow-style:none;
  scroll-behavior:smooth;
}
.toolbar::-webkit-scrollbar { display:none; }

/* Scroll arrows */
.tb-scroll-btn {
  display:none;
  position:absolute;
  top:0;bottom:0;
  width:28px;
  border:none;background:linear-gradient(to right, var(--surface) 60%, transparent);
  cursor:pointer;
  color:var(--muted);
  align-items:center;justify-content:center;
  z-index:2;
  transition:color .12s;
}
.tb-scroll-btn:hover{color:var(--accent)}
.tb-scroll-btn svg{width:14px;height:14px;pointer-events:none}
.tb-scroll-btn.left { left:0; background:linear-gradient(to right, var(--surface) 60%, transparent); }
.tb-scroll-btn.right{ right:0; background:linear-gradient(to left, var(--surface) 60%, transparent); }
.toolbar-wrap.can-scroll-left  .tb-scroll-btn.left  { display:flex; }
.toolbar-wrap.can-scroll-right .tb-scroll-btn.right { display:flex; }

.tb-sep{width:1px;height:20px;background:var(--border);margin:0 3px;flex-shrink:0}

/* Tool button */
.tb{
  width:30px;height:30px;
  border:none;border-radius:var(--r);
  background:transparent;
  cursor:pointer;
  color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,color .12s;
  flex-shrink:0;
  position:relative;
}
.tb:hover{background:var(--bg);color:var(--text)}
.tb.on{background:var(--accent-bg);color:var(--accent)}
.tb svg{width:15px;height:15px;pointer-events:none}

/* Style select */
.tb-select{
  height:30px;
  border:1px solid var(--border);
  border-radius:var(--r);
  background:var(--surface);
  font-family:'Inter',system-ui,sans-serif;
  font-size:12.5px;font-weight:500;
  color:var(--text);
  padding:0 6px;
  cursor:pointer;
  outline:none;
  transition:border-color .13s;
  flex-shrink:0;
}
.tb-select:hover,.tb-select:focus{border-color:var(--accent)}
#blockStyle{min-width:102px}
#fontFam{min-width:110px}

/* Font size control */
.size-ctrl{
  display:flex;align-items:center;
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  height:30px;flex-shrink:0;
  transition:border-color .13s;
}
.size-ctrl:focus-within{border-color:var(--accent)}
.size-btn{
  width:22px;height:28px;
  border:none;background:var(--bg);
  cursor:pointer;font-size:15px;line-height:1;
  color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,color .12s;
  flex-shrink:0;
  user-select:none;
}
.size-btn:hover{background:var(--border2);color:var(--text)}
.size-inp{
  width:34px;height:28px;
  border:none;
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
  outline:none;
  text-align:center;
  font-family:'Inter',system-ui,sans-serif;
  font-size:12.5px;color:var(--text);
  background:var(--surface);
  -moz-appearance:textfield;
}
.size-inp::-webkit-inner-spin-button,
.size-inp::-webkit-outer-spin-button{-webkit-appearance:none}

/* Color picker button */
.col-btn{
  width:30px;height:30px;
  border:none;border-radius:var(--r);
  background:transparent;
  cursor:pointer;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;
  transition:background .12s;
  flex-shrink:0;
  position:relative;
}
.col-btn:hover{background:var(--bg)}
.col-btn svg{width:14px;height:14px;pointer-events:none;color:var(--muted)}
.col-bar{width:16px;height:3px;border-radius:2px;pointer-events:none}
.col-btn input[type=color]{
  position:absolute;opacity:0;
  width:0;height:0;pointer-events:none;
}

/* ═══════════ RESPONSIVE TOPBAR ═══════════ */
/* 900px — hide brand name */
@media(max-width:900px){
  .brand-name { display:none; }
  .doc-name-wrap { max-width:200px; }
}
/* 720px — collapse action buttons to hamburger */
@media(max-width:720px){
  .topbar-actions .btn:not(.btn-solid):not(.btn-outline) { display:none; }
  .topbar-menu-btn { display:flex; }
  .topbar { position:relative; }
  .doc-name-wrap { max-width:160px; }
}
/* 520px — also collapse export buttons to icon only */
@media(max-width:520px){
  .btn-outline .btn-label,
  .btn-solid .btn-label { display:none; }
  .btn-outline,.btn-solid { width:32px;padding:0;justify-content:center; }
  .doc-name-wrap { max-width:110px; }
}

/* Tooltip */
[data-tip]{position:relative}
[data-tip]::after{
  content:attr(data-tip);
  position:absolute;
  bottom:calc(100% + 7px);left:50%;
  transform:translateX(-50%);
  background:var(--text);color:#fff;
  font-family:'Inter',system-ui,sans-serif;
  font-size:11px;font-weight:500;
  padding:3px 8px;border-radius:5px;
  white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .15s .1s;
  z-index:999;
}
[data-tip]:hover::after{opacity:1}

/* ═══════════ MAIN LAYOUT (sidebar + content) ═══════════ */
.main-layout {
  flex:1;
  display:flex;
  overflow:hidden;
}

/* ═══════════ TOC SIDEBAR ═══════════ */
.toc-sidebar {
  width:220px;
  min-width:220px;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
  overflow:hidden;
  transition:width .25s, min-width .25s, opacity .2s;
}
.toc-sidebar.hidden {
  width:0; min-width:0; opacity:0; pointer-events:none;
}

.toc-header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 14px 8px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.toc-title {
  font-size:11px;
  font-weight:600;
  color:var(--subtle);
  text-transform:uppercase;
  letter-spacing:.6px;
}
.toc-toggle {
  width:22px;height:22px;
  border:none;background:transparent;
  cursor:pointer;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  color:var(--subtle);
  transition:background .12s,color .12s;
}
.toc-toggle:hover{background:var(--bg);color:var(--text)}
.toc-toggle svg{width:12px;height:12px}

.toc-list {
  flex:1;
  overflow-y:auto;
  padding:8px 0 20px;
  scrollbar-width:thin;
  scrollbar-color:var(--border2) transparent;
}
.toc-list::-webkit-scrollbar{width:4px}
.toc-list::-webkit-scrollbar-track{background:transparent}
.toc-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.toc-item {
  display:block;
  padding:5px 14px 5px;
  font-family:'Inter',system-ui,sans-serif;
  font-size:12.5px;
  color:var(--muted);
  text-decoration:none;
  border-left:2px solid transparent;
  transition:color .12s,background .12s,border-color .12s;
  cursor:pointer;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  line-height:1.4;
  border:none;background:transparent;
  width:100%;text-align:left;
}
.toc-item:hover {
  color:var(--text);
  background:var(--bg);
}
.toc-item.active {
  color:var(--accent);
  background:var(--accent-bg);
  border-left:2px solid var(--accent);
}
.toc-item.h1 { padding-left:14px; font-weight:600; color:var(--text); font-size:13px; }
.toc-item.h2 { padding-left:22px; }
.toc-item.h3 { padding-left:34px; font-size:11.5px; }

.toc-empty {
  padding:16px 14px;
  font-size:12px;
  color:var(--subtle);
  font-style:italic;
  line-height:1.5;
}

/* TOC open button (when sidebar hidden) */
.toc-open-btn {
  display:none;
  position:absolute;
  left:0; top:50%;
  transform:translateY(-50%);
  width:20px;height:52px;
  background:var(--surface);
  border:1px solid var(--border);
  border-left:none;
  border-radius:0 var(--r) var(--r) 0;
  cursor:pointer;
  align-items:center;justify-content:center;
  box-shadow:var(--sh-sm);
  z-index:10;
  color:var(--subtle);
  transition:color .12s,background .12s;
}
.toc-open-btn:hover{background:var(--bg);color:var(--accent)}
.toc-open-btn svg{width:10px;height:10px}
.toc-sidebar.hidden + .scroll-area .toc-open-btn,
.main-layout.toc-closed .toc-open-btn { display:flex; }

/* ═══════════ SCROLL + PAGE ═══════════ */
.scroll-area{
  flex:1;
  overflow-y:auto;
  padding:32px 20px calc(var(--statusbar) + 36px);
  background:var(--bg);
  background-image:
    radial-gradient(circle,rgba(180,185,200,.4) 1px,transparent 1px);
  background-size:22px 22px;
  position:relative;
}

.page{
  width:100%;max-width:752px;
  margin:0 auto;
  background:var(--paper);
  border-radius:var(--r);
  box-shadow:var(--sh-lg),0 0 0 1px rgba(0,0,0,.04);
  padding:76px 84px 100px;
  position:relative;
  transition:box-shadow .25s;
}
/* Accent bar on top */
.page::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),#818cf8,#60a5fa);
  border-radius:var(--r) var(--r) 0 0;
}

/* ContentEditable */
.editor{
  outline:none;
  min-height:200px;
  font-family:'Lora',serif;
  font-size:16px;
  line-height:1.85;
  color:var(--text);
  caret-color:var(--accent);
  word-break:break-word;
}
.editor:empty::before{
  content:'Почніть вводити текст…';
  color:#c5c9d4;
  pointer-events:none;
  display:block;
}

/* Rich text content */
.editor h1{font-family:'Lora',serif;font-size:2.15em;font-weight:700;line-height:1.2;margin:.1em 0 .5em;color:#0f172a;letter-spacing:-.5px}
.editor h2{font-family:'Lora',serif;font-size:1.5em;font-weight:600;line-height:1.3;margin:.8em 0 .4em}
.editor h3{font-family:'Lora',serif;font-size:1.2em;font-weight:600;line-height:1.4;margin:.6em 0 .3em}
.editor p{margin-bottom:.5em}
.editor ul,.editor ol{padding-left:1.6em;margin-bottom:.6em}
.editor li{margin-bottom:.25em}
.editor blockquote{
  border-left:3px solid var(--accent);
  padding:8px 18px;margin:1em 0;
  color:var(--muted);font-style:italic;
  background:var(--accent-bg);
  border-radius:0 var(--r) var(--r) 0;
}
.editor a{color:var(--accent);text-decoration:underline}
.editor code{
  background:var(--bg);border-radius:5px;
  padding:2px 5px;
  font-family:'Courier New',monospace;font-size:.9em;
}
.editor pre{
  background:var(--bg);border-radius:var(--r);
  padding:14px 18px;margin:.8em 0;
  font-family:'Courier New',monospace;font-size:.9em;
  white-space:pre-wrap;border:1px solid var(--border);
}
.editor hr{border:none;border-top:1.5px solid var(--border);margin:1.5em 0}

/* ═══════════ IMAGE IN EDITOR ═══════════ */
.editor img {
  max-width:100%;
  height:auto;
  display:block;
  cursor:pointer;
  border-radius:4px;
  user-select:none;
}
.editor img.img-left   { float:left;  margin:4px 16px 8px 0; display:inline; }
.editor img.img-right  { float:right; margin:4px 0 8px 16px; display:inline; }
.editor img.img-center { margin:8px auto; display:block; }

/* Image wrapper — shown when selected */
.img-wrap {
  display:inline-block;
  position:relative;
  line-height:0;
  cursor:default;
}
.img-wrap.img-center { display:block; margin:8px auto; width:fit-content; }
.img-wrap.img-left   { float:left; margin:4px 16px 8px 0; }
.img-wrap.img-right  { float:right; margin:4px 0 8px 16px; }

.img-wrap img {
  display:block;
  max-width:100%;
  height:auto;
  cursor:pointer;
  user-select:none;
}

/* Selection overlay */
.img-wrap.selected img {
  outline:2px solid var(--accent);
  outline-offset:0;
}

/* Resize handles — 8 points */
.img-handle {
  display:none;
  position:absolute;
  width:10px; height:10px;
  background:var(--accent);
  border:2px solid #fff;
  border-radius:2px;
  z-index:100;
  box-shadow:0 1px 4px rgba(0,0,0,.25);
}
.img-wrap.selected .img-handle { display:block; }

.img-handle[data-dir="nw"] { top:-5px;  left:-5px;  cursor:nw-resize; }
.img-handle[data-dir="n"]  { top:-5px;  left:calc(50% - 5px); cursor:n-resize; }
.img-handle[data-dir="ne"] { top:-5px;  right:-5px; cursor:ne-resize; }
.img-handle[data-dir="e"]  { top:calc(50% - 5px); right:-5px; cursor:e-resize; }
.img-handle[data-dir="se"] { bottom:-5px; right:-5px; cursor:se-resize; }
.img-handle[data-dir="s"]  { bottom:-5px; left:calc(50% - 5px); cursor:s-resize; }
.img-handle[data-dir="sw"] { bottom:-5px; left:-5px; cursor:sw-resize; }
.img-handle[data-dir="w"]  { top:calc(50% - 5px); left:-5px; cursor:w-resize; }

/* Size tooltip during drag */
.img-size-tip {
  display:none;
  position:absolute;
  bottom:calc(100% + 6px);
  left:50%; transform:translateX(-50%);
  background:#1a1d23cc;
  color:#fff;
  font-family:'Inter',system-ui,sans-serif;
  font-size:11px; font-weight:500;
  padding:3px 8px;
  border-radius:5px;
  white-space:nowrap;
  pointer-events:none;
  z-index:200;
  backdrop-filter:blur(4px);
}
.img-wrap.resizing .img-size-tip { display:block; }

/* Floating mini toolbar above selected image */
.img-toolbar {
  display:none;
  position:absolute;
  bottom:calc(100% + 8px);
  left:50%; transform:translateX(-50%);
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  box-shadow:var(--sh-lg);
  padding:4px 6px;
  gap:2px;
  align-items:center;
  white-space:nowrap;
  z-index:300;
  animation:popIn .15s ease;
}
.img-wrap.selected .img-toolbar { display:flex; }

.img-tb-btn {
  height:26px; padding:0 7px;
  border:none; border-radius:4px;
  background:transparent;
  font-family:'Inter',system-ui,sans-serif;
  font-size:11.5px; font-weight:500;
  color:var(--muted);
  cursor:pointer;
  display:flex; align-items:center; gap:3px;
  transition:background .1s, color .1s;
  flex-shrink:0;
}
.img-tb-btn:hover { background:var(--bg); color:var(--text); }
.img-tb-btn.active { background:var(--accent-bg); color:var(--accent); }
.img-tb-btn svg { width:12px; height:12px; flex-shrink:0; }
.img-tb-sep { width:1px; height:16px; background:var(--border); margin:0 2px; flex-shrink:0; }

/* Border picker inside toolbar */
.img-border-row {
  display:flex; align-items:center; gap:3px;
}
.img-border-sel {
  height:24px; padding:0 4px;
  border:1px solid var(--border); border-radius:4px;
  background:var(--surface);
  font-size:11px; color:var(--muted);
  cursor:pointer; outline:none;
}
.img-border-col {
  width:22px; height:22px;
  border-radius:4px; border:1px solid var(--border);
  overflow:hidden; cursor:pointer; flex-shrink:0;
  position:relative;
}
.img-border-col input {
  position:absolute; inset:-4px;
  width:calc(100% + 8px); height:calc(100% + 8px);
  border:none; cursor:pointer; padding:0;
}
.img-radius-row {
  display:flex; align-items:center; gap:4px;
}
.img-radius-row label { font-size:10px; color:var(--subtle); }
.img-radius-row input[type=range] {
  width:56px; height:3px; accent-color:var(--accent); cursor:pointer;
}
.img-radius-val { font-size:10px; color:var(--muted); font-weight:600; min-width:26px; }

/* ═══════════ STATUS BAR ═══════════ */
.statusbar{
  height:var(--statusbar);
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 16px;gap:16px;
  font-size:11.5px;color:var(--subtle);
  font-weight:500;
  flex-shrink:0;z-index:60;
}
.sb-dot{
  width:5px;height:5px;border-radius:50%;
  background:#22c55e;display:inline-block;margin-right:4px;
}
.sb-right{margin-left:auto}

/* ═══════════ FOCUS MODE ═══════════ */
body.focus-mode .topbar,
body.focus-mode .toolbar,
body.focus-mode .toc-sidebar,
body.focus-mode .statusbar {
  opacity:0; pointer-events:none; transition:opacity .3s;
}
body.focus-mode .scroll-area {
  padding-top:60px;
}
body.focus-mode .page {
  max-width:640px;
  box-shadow:none;
}
.focus-exit {
  display:none;
  position:fixed;top:12px;right:16px;
  z-index:9000;
}
body.focus-mode .focus-exit { display:flex; }

/* ═══════════ FIND & REPLACE ═══════════ */
.find-bar {
  display:none;
  position:fixed;
  top:calc(var(--topbar) + var(--toolbar) + 8px);
  right:12px;
  /* Never wider than screen with safe margins */
  width:min(360px, calc(100vw - 24px));
  max-height:calc(100vh - var(--topbar) - var(--toolbar) - 32px);
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:var(--r-lg);
  box-shadow:var(--sh-lg);
  padding:10px 12px;
  z-index:1000;
  animation:popIn .15s ease;
  flex-direction:column;
  gap:7px;
  overflow:hidden;
  box-sizing:border-box;
}
.find-bar.open { display:flex; }

.find-bar-row {
  display:flex;
  align-items:center;
  gap:5px;
  min-width:0;
}
.find-bar-label {
  font-size:11px; color:var(--subtle); font-weight:600;
  width:48px; min-width:48px; flex-shrink:0;
}
.find-inp {
  flex:1; min-width:0;
  height:28px; padding:0 8px;
  border:1px solid var(--border2); border-radius:var(--r);
  font-family:'Inter',system-ui,sans-serif; font-size:13px; color:var(--text);
  background:var(--bg); outline:none;
  transition:border-color .13s;
}
.find-inp:focus { border-color:var(--accent); }
.find-nav { display:flex; gap:3px; flex-shrink:0; }
.find-nav-btn {
  width:26px; height:26px; border:1px solid var(--border); border-radius:5px;
  background:var(--surface); cursor:pointer; color:var(--muted);
  display:flex; align-items:center; justify-content:center;
  transition:all .12s; flex-shrink:0;
}
.find-nav-btn:hover { background:var(--bg); color:var(--text); }
.find-nav-btn svg { width:11px; height:11px; }
.find-count {
  font-size:11px; color:var(--subtle);
  min-width:38px; max-width:54px;
  text-align:center; flex-shrink:0;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.find-close {
  width:24px; height:24px; border:none; background:transparent;
  border-radius:4px; cursor:pointer; color:var(--subtle);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  transition:background .12s,color .12s;
}
.find-close:hover { background:var(--bg); color:var(--text); }
.find-replace-row { display:flex; gap:4px; flex-shrink:0; flex-wrap:wrap; }
.find-replace-btn {
  height:26px; padding:0 9px; border:1px solid var(--border);
  border-radius:var(--r); background:var(--surface);
  font-family:'Inter',system-ui,sans-serif; font-size:12px; font-weight:500;
  color:var(--muted); cursor:pointer; white-space:nowrap;
  transition:all .12s;
}
.find-replace-btn:hover { background:var(--bg); color:var(--text); border-color:var(--accent); }
.find-replace-btn.primary { background:var(--accent-bg); color:var(--accent); border-color:var(--accent-lt); }
.find-replace-btn.primary:hover { background:#dde3fd; }

/* On very small screens — anchor to top-left instead */
@media(max-width:400px) {
  .find-bar {
    right:auto;
    left:6px;
    width:calc(100vw - 12px);
  }
}

/* Highlight marks */
mark.find-hl { background:#fef08a; color:inherit; border-radius:2px; }
mark.find-hl.current { background:#fb923c; color:#fff; }

/* ═══════════ TOOLBAR GROUP LABELS ═══════════ */
.tb-group { display:flex; align-items:center; gap:1px; }

/* ═══════════ WORD COUNT BADGE ═══════════ */
.sb-reading {
  color:var(--subtle);
  font-size:11.5px;
}

/* ═══════════ OVERLAY ═══════════ */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(15,18,25,.4);
  backdrop-filter:blur(5px);
  -webkit-backdrop-filter:blur(5px);
  z-index:9999;
  align-items:center;justify-content:center;
}
.overlay.show{display:flex}
.ov-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  padding:36px 44px;
  text-align:center;
  box-shadow:var(--sh-lg);
  animation:popIn .2s ease;
}
@keyframes popIn{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
.spin{
  width:40px;height:40px;margin:0 auto 14px;
  border:2.5px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.ov-card strong{font-size:15px;font-weight:600;display:block;margin-bottom:4px;color:var(--text)}
.ov-card span{font-size:13px;color:var(--muted)}

/* ═══════════ FADE IN ═══════════ */
body{animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

@media(max-width:680px){
  .page{padding:40px 22px 60px}
  .scroll-area{padding:14px 6px 48px}
}
</style>

<!-- img-wrap toolbars are created dynamically via JS -->

<script>
/* ══ STATE ══ */
const editor = document.getElementById('editor');
let saveTimer, selectedImg = null;
const STORE_KEY = 'tc3_html', STORE_NAME = 'tc3_name';

/* ══ execCommand ══ */
function exec(cmd, val = null) {
  editor.focus();
  document.execCommand(cmd, false, val);
  syncState(); tick();
}

/* ══ BLOCK STYLE ══ */
function applyBlock(tag) {
  editor.focus();
  document.execCommand('formatBlock', false, tag);
  syncState();
}

/* ══ FONT FAMILY ══ */
function applyFontFam(fam) {
  editor.focus();
  wrapStyle('fontFamily', fam);
  syncState();
}

/* ══ FONT SIZE ══ */
function changeSize(d) {
  const el = document.getElementById('fontSize');
  const v = Math.min(144, Math.max(6, (parseInt(el.value) || 16) + d));
  el.value = v;
  applyFontSize(v);
}
function applyFontSize(px) {
  editor.focus();
  wrapStyle('fontSize', px + 'px');
}

/* ══ COLORS ══ */
function applyTxtColor(c) {
  document.getElementById('barTxt').style.background = c;
  editor.focus();
  document.execCommand('foreColor', false, c);
}
function applyHL(c) {
  document.getElementById('barHL').style.background = c;
  editor.focus();
  document.execCommand('hiliteColor', false, c);
}

/* ══ WRAP SELECTION WITH SPAN STYLE ══ */
function wrapStyle(prop, val) {
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  if (range.collapsed) return;
  const span = document.createElement('span');
  span.style[prop] = val;
  try {
    range.surroundContents(span);
  } catch(e) {
    const frag = range.extractContents();
    span.appendChild(frag);
    range.insertNode(span);
  }
  sel.removeAllRanges();
  const r2 = document.createRange();
  r2.selectNodeContents(span);
  sel.addRange(r2);
  tick();
}

/* ══ LINK ══ */
function insertLink() {
  const url = prompt('URL посилання:');
  if (url && url.trim()) {
    exec('createLink', url.trim());
    editor.querySelectorAll('a').forEach(a => {
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
    });
  }
}

/* ══════════════════════════════
   IMAGE HANDLING — drag-resize
══════════════════════════════ */

const HANDLES = ['nw','n','ne','e','se','s','sw','w'];

/* ── Saved cursor range (before file dialog steals focus) ── */
let savedRange = null;

function saveCursor() {
  const sel = window.getSelection();
  if (sel && sel.rangeCount && editor.contains(sel.getRangeAt(0).commonAncestorContainer)) {
    savedRange = sel.getRangeAt(0).cloneRange();
  } else {
    savedRange = null;
  }
}

function insertWrapAtCursor(wrap) {
  const p = document.createElement('p');
  p.style.textAlign = 'center';
  p.appendChild(wrap);

  // Try saved range first, then live selection, then append to end
  let range = savedRange;
  if (!range) {
    const sel = window.getSelection();
    if (sel && sel.rangeCount && editor.contains(sel.getRangeAt(0).commonAncestorContainer)) {
      range = sel.getRangeAt(0);
    }
  }

  if (range) {
    range.collapse(false);
    range.insertNode(p);
    // Move cursor after the inserted image
    const after = document.createRange();
    after.setStartAfter(p);
    after.collapse(true);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(after);
  } else {
    editor.appendChild(p);
  }

  savedRange = null;
}

function triggerImageInsert() {
  saveCursor(); // save before focus is lost to file dialog
  document.getElementById('imgFileInput').click();
}

function insertImageFromFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const wrap = createImgWrap(e.target.result, '100%', 'img-center');
    insertWrapAtCursor(wrap);
    selectWrap(wrap);
    tick();
  };
  reader.readAsDataURL(file);
  input.value = '';
}

/* Build the wrapper with handles + mini toolbar */
function createImgWrap(src, width, alignCls) {
  const wrap = document.createElement('span');
  wrap.className = 'img-wrap ' + (alignCls || 'img-center');
  wrap.contentEditable = 'false';

  const img = document.createElement('img');
  img.src = src;
  img.style.width = width || '100%';
  img.draggable = false;
  wrap.appendChild(img);

  // 8 resize handles
  HANDLES.forEach(dir => {
    const h = document.createElement('span');
    h.className = 'img-handle';
    h.dataset.dir = dir;
    wrap.appendChild(h);
    h.addEventListener('mousedown', e => startResize(e, wrap, img, dir));
  });

  // Size tooltip
  const tip = document.createElement('span');
  tip.className = 'img-size-tip';
  wrap.appendChild(tip);

  // Mini toolbar
  const tb = buildImgToolbar(wrap, img);
  wrap.appendChild(tb);

  // Click to select
  img.addEventListener('click', e => { e.stopPropagation(); selectWrap(wrap); });
  wrap.addEventListener('click', e => e.stopPropagation());

  return wrap;
}

/* Mini toolbar */
function buildImgToolbar(wrap, img) {
  const tb = document.createElement('span');
  tb.className = 'img-toolbar';

  // Alignment
  [
    ['img-left',   'Л', 'M0 1h12v1.5H0zm0 3h7v1.5H0zm0 3h12v1.5H0zm0 3h7v1.5H0z'],
    ['img-center', 'Ц', 'M0 1h12v1.5H0zm2.5 3h7v1.5h-7zm-2.5 3h12v1.5H0zm2.5 3h7v1.5h-7z'],
    ['img-right',  'П', 'M0 1h12v1.5H0zm5 3h7v1.5H5zm-5 3h12v1.5H0zm5 3h7v1.5H5z'],
  ].forEach(([cls, label, path]) => {
    const btn = document.createElement('button');
    btn.className = 'img-tb-btn';
    btn.dataset.align = cls;
    btn.title = label === 'Л' ? 'По лівому' : label === 'Ц' ? 'По центру' : 'По правому';
    btn.innerHTML = `<svg viewBox="0 0 12 12" fill="currentColor"><path d="${path}"/></svg>${label}`;
    btn.addEventListener('mousedown', e => {
      e.preventDefault();
      setWrapAlign(wrap, cls);
      tb.querySelectorAll('.img-tb-btn[data-align]').forEach(b =>
        b.classList.toggle('active', b.dataset.align === cls));
    });
    if (wrap.classList.contains(cls)) btn.classList.add('active');
    tb.appendChild(btn);
  });

  const sep1 = document.createElement('span'); sep1.className = 'img-tb-sep'; tb.appendChild(sep1);

  // Border style select
  const bRow = document.createElement('span'); bRow.className = 'img-border-row';
  const bSel = document.createElement('select'); bSel.className = 'img-border-sel';
  [['none','Без рамки'],['solid','Суцільна'],['dashed','Пунктир'],['dotted','Крапки'],['double','Подвійна']]
    .forEach(([v,t]) => { const o = document.createElement('option'); o.value=v; o.textContent=t; bSel.appendChild(o); });
  bSel.addEventListener('change', () => applyWrapBorder(img, bSel, bCol, bWidth));

  const bCol = document.createElement('span'); bCol.className = 'img-border-col';
  const bColInput = document.createElement('input'); bColInput.type = 'color'; bColInput.value = '#4F6BF4';
  bColInput.addEventListener('input', () => applyWrapBorder(img, bSel, bColInput, bWidth));
  bCol.appendChild(bColInput);

  const bWidth = document.createElement('select'); bWidth.className = 'img-border-sel'; bWidth.style.minWidth='46px';
  ['1','2','3','4','6'].forEach(v => { const o=document.createElement('option'); o.value=v; o.textContent=v+'px'; if(v==='2')o.selected=true; bWidth.appendChild(o); });
  bWidth.addEventListener('change', () => applyWrapBorder(img, bSel, bColInput, bWidth));

  bRow.appendChild(bSel); bRow.appendChild(bCol); bRow.appendChild(bWidth);
  tb.appendChild(bRow);

  const sep2 = document.createElement('span'); sep2.className = 'img-tb-sep'; tb.appendChild(sep2);

  // Border radius
  const rRow = document.createElement('span'); rRow.className = 'img-radius-row';
  const rLabel = document.createElement('label'); rLabel.textContent = 'Кут';
  const rRange = document.createElement('input'); rRange.type = 'range'; rRange.min=0; rRange.max=50; rRange.value=parseInt(img.style.borderRadius)||4;
  const rVal = document.createElement('span'); rVal.className = 'img-radius-val'; rVal.textContent = rRange.value+'px';
  rRange.addEventListener('input', () => { img.style.borderRadius = rRange.value+'px'; rVal.textContent = rRange.value+'px'; tick(); });
  rRow.appendChild(rLabel); rRow.appendChild(rRange); rRow.appendChild(rVal);
  tb.appendChild(rRow);

  const sep3 = document.createElement('span'); sep3.className = 'img-tb-sep'; tb.appendChild(sep3);

  // Delete
  const del = document.createElement('button');
  del.className = 'img-tb-btn';
  del.title = 'Видалити';
  del.style.cssText = 'color:#ef4444';
  del.innerHTML = `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h8M4 3V2h4v1M3 3l.6 7h4.8L9 3"/></svg>Видалити`;
  del.addEventListener('mousedown', e => { e.preventDefault(); deselectAll(); wrap.closest('p')?.remove() || wrap.remove(); tick(); });
  tb.appendChild(del);

  return tb;
}

function applyWrapBorder(img, bSel, bCol, bWidth) {
  const style = bSel.value;
  const color = bCol.value || bCol.querySelector('input')?.value || '#4F6BF4';
  const width = bWidth.value;
  img.style.border = style === 'none' ? 'none' : `${width}px ${style} ${color}`;
  tick();
}

function setWrapAlign(wrap, cls) {
  wrap.classList.remove('img-left','img-center','img-right');
  wrap.classList.add(cls);
  tick();
}

/* Selection */
function selectWrap(wrap) {
  deselectAll();
  selectedImg = wrap;
  wrap.classList.add('selected');
}

function deselectAll() {
  editor.querySelectorAll('.img-wrap.selected').forEach(w => w.classList.remove('selected'));
  selectedImg = null;
}

/* ── DRAG RESIZE ── */
function startResize(e, wrap, img, dir) {
  e.preventDefault();
  e.stopPropagation();

  const startX  = e.clientX;
  const startW  = img.offsetWidth;
  const maxW    = wrap.closest('.editor')?.offsetWidth || 600;
  const tip     = wrap.querySelector('.img-size-tip');

  wrap.classList.add('resizing');

  function onMove(e) {
    const dx = e.clientX - startX;
    let newW;

    if (dir.includes('e'))  newW = startW + dx;
    else if (dir.includes('w')) newW = startW - dx;
    else return; // n/s only — keep aspect ratio via height:auto

    newW = Math.max(40, Math.min(maxW, newW));
    img.style.width = newW + 'px';
    img.style.maxWidth = '100%';

    const pct = Math.round(newW / maxW * 100);
    if (tip) tip.textContent = newW + 'px · ' + pct + '%';
    tick();
  }

  function onUp() {
    wrap.classList.remove('resizing');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    tick();
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

/* Attach listeners to images already in DOM (from localStorage) */
function attachAllImgListeners() {
  // Migrate bare <img> tags to wrapped versions
  editor.querySelectorAll('img:not(.img-wrap img)').forEach(img => {
    const w = parseInt(img.style.width) || null;
    const alignCls = img.classList.contains('img-left') ? 'img-left'
                   : img.classList.contains('img-right') ? 'img-right' : 'img-center';
    const wrap = createImgWrap(img.src, w ? w+'px' : '100%', alignCls);
    // copy border/radius
    if (img.style.border) wrap.querySelector('img').style.border = img.style.border;
    if (img.style.borderRadius) wrap.querySelector('img').style.borderRadius = img.style.borderRadius;
    img.replaceWith(wrap);
  });
  // Existing wraps: just re-attach handles
  editor.querySelectorAll('.img-wrap').forEach(wrap => {
    const img = wrap.querySelector('img');
    if (!img) return;
    wrap.querySelectorAll('.img-handle').forEach(h => {
      h.addEventListener('mousedown', e => startResize(e, wrap, img, h.dataset.dir));
    });
    img.addEventListener('click', e => { e.stopPropagation(); selectWrap(wrap); });
  });
}

/* ══ TOOLBAR SCROLL ══ */
const tbEl = document.getElementById('toolbar');
const tbWrap = document.getElementById('toolbarWrap');

function updateTbScrollBtns() {
  if (!tbEl) return;
  const atLeft  = tbEl.scrollLeft <= 2;
  const atRight = tbEl.scrollLeft >= tbEl.scrollWidth - tbEl.clientWidth - 2;
  const canScroll = tbEl.scrollWidth > tbEl.clientWidth + 4;
  tbWrap.classList.toggle('can-scroll-left',  canScroll && !atLeft);
  tbWrap.classList.toggle('can-scroll-right', canScroll && !atRight);
}

function tbScroll(dx) {
  tbEl.scrollBy({ left: dx, behavior: 'smooth' });
}

tbEl.addEventListener('scroll', updateTbScrollBtns, { passive: true });
new ResizeObserver(updateTbScrollBtns).observe(tbEl);
setTimeout(updateTbScrollBtns, 100);

/* ══ TOPBAR DROPDOWN MENU ══ */
function toggleTopbarMenu() {
  const dd = document.getElementById('topbarDropdown');
  dd.classList.toggle('open');
}
function closeTopbarMenu() {
  document.getElementById('topbarDropdown').classList.remove('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('#topbarMenuBtn') && !e.target.closest('#topbarDropdown')) {
    closeTopbarMenu();
  }
});

/* ══ TOC ══ */
let tocVisible = true;

function toggleToc() {
  tocVisible = !tocVisible;
  document.getElementById('tocSidebar').classList.toggle('hidden', !tocVisible);
  const openBtn = document.getElementById('tocOpenBtn');
  if (openBtn) openBtn.style.display = tocVisible ? 'none' : 'flex';
}

function buildToc() {
  const list = document.getElementById('tocList');
  const headings = editor.querySelectorAll('h1,h2,h3');

  if (headings.length === 0) {
    list.innerHTML = '<div class="toc-empty">Додайте заголовки H1–H3 щоб побачити зміст</div>';
    return;
  }

  list.innerHTML = '';
  headings.forEach((h, i) => {
    if (!h.id) h.id = 'heading-' + i;
    const tag = h.tagName.toLowerCase();
    const btn = document.createElement('button');
    btn.className = 'toc-item ' + tag;
    btn.textContent = h.textContent.trim() || '(без назви)';
    btn.title = btn.textContent;
    btn.addEventListener('click', () => {
      const scrollArea = document.getElementById('scrollArea');
      const page = document.getElementById('page');
      // heading offset relative to page, plus page offset in scrollArea
      const pageTop = page.offsetTop;
      const headingTop = h.offsetTop; // relative to editor (inside page)
      const editorTop = document.querySelector('.editor').offsetTop; // editor inside page
      const target = pageTop + editorTop + headingTop - 80;
      scrollArea.scrollTo({ top: target, behavior: 'smooth' });
      list.querySelectorAll('.toc-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
    list.appendChild(btn);
  });
}

let tocTimer;
function scheduleToc() {
  clearTimeout(tocTimer);
  tocTimer = setTimeout(buildToc, 400);
}

function syncTocActive() {
  const headings = [...editor.querySelectorAll('h1,h2,h3')];
  if (!headings.length) return;
  const scrollTop = document.getElementById('scrollArea').scrollTop;
  const pageOffsetTop = document.getElementById('page').offsetTop;
  let active = headings[0];
  headings.forEach(h => {
    if ((h.offsetTop + pageOffsetTop - 80) <= scrollTop) active = h;
  });
  const items = document.getElementById('tocList').querySelectorAll('.toc-item');
  items.forEach((item, i) => item.classList.toggle('active', headings[i] === active));
}

document.getElementById('scrollArea').addEventListener('scroll', syncTocActive, { passive:true });

/* ══ SYNC TOOLBAR STATE ══ */
function syncState() {
  ['bold','italic','underline','strikeThrough','superscript','subscript'].forEach(cmd => {
    const b = document.getElementById('btn-' + cmd);
    if (b) b.classList.toggle('on', document.queryCommandState(cmd));
  });
  try {
    const bv = document.queryCommandValue('formatBlock').toLowerCase().replace(/[<>]/g,'');
    const map = {p:'p',h1:'h1',h2:'h2',h3:'h3',blockquote:'blockquote',pre:'pre'};
    document.getElementById('blockStyle').value = map[bv] || 'p';
  } catch(e) {}
  try {
    const sel = window.getSelection();
    if (sel && sel.rangeCount) {
      const node = sel.getRangeAt(0).startContainer;
      const el = node.nodeType === 3 ? node.parentElement : node;
      if (el && editor.contains(el)) {
        const fs = parseInt(getComputedStyle(el).fontSize);
        if (fs > 0) document.getElementById('fontSize').value = fs;
      }
    }
  } catch(e) {}
}

/* ══ STATUS ══ */
function tick() {
  const t = editor.innerText || '';
  const w = t.trim() === '' ? 0 : t.trim().split(/\s+/).length;
  const c = t.replace(/\n/g,'').length;
  document.getElementById('sb-w').textContent = 'Слів: ' + w;
  document.getElementById('sb-c').textContent = 'Символів: ' + c;
  document.getElementById('sb-p').textContent = 'Стор. ~' + Math.max(1, Math.ceil(w / 500));
  updateReading(w);
  scheduleSave();
  scheduleToc();
}

/* ══ AUTO SAVE ══ */
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(STORE_KEY, editor.innerHTML);
      localStorage.setItem(STORE_NAME, document.getElementById('docTitle').value);
    } catch(e) {}
  }, 900);
}

function loadSaved() {
  try {
    // Clear any corrupt old data from previous versions
    ['tc2_html','tc2_name','tc_html','tc_name','textcraft_content','textcraft_name'].forEach(k => {
      try { localStorage.removeItem(k); } catch(e) {}
    });
    const h = localStorage.getItem(STORE_KEY);
    const n = localStorage.getItem(STORE_NAME);
    if (h && h.trim() && !h.includes('function exec(')) {
      editor.innerHTML = h;
    }
    if (n) document.getElementById('docTitle').value = n;
  } catch(e) {}
  attachAllImgListeners();
  tick();
}

/* ══ CLEAR ══ */
function clearDoc() {
  if (!confirm('Очистити весь документ?')) return;
  editorSnapshot = '';
  findResults = []; findIdx = 0;
  document.getElementById('findBar').classList.remove('open');
  document.getElementById('findCount').textContent = '';
  editor.innerHTML = '';
  try {
    localStorage.removeItem(STORE_KEY);
    localStorage.removeItem(STORE_NAME);
  } catch(e) {}
  tick();
  editor.focus();
}

/* ══ FIND & REPLACE ══ */
let findQuery = '', findResults = [], findIdx = 0;
let editorSnapshot = '';   // innerHTML snapshot taken before marking
let isMarking = false;     // guard against re-entrant input events

function toggleFindBar() {
  const bar = document.getElementById('findBar');
  if (bar.classList.contains('open')) {
    closeFindBar();
  } else {
    bar.classList.add('open');
    document.getElementById('findInp').focus();
  }
}

function closeFindBar() {
  document.getElementById('findBar').classList.remove('open');
  document.getElementById('findInp').value = '';
  document.getElementById('replaceInp').value = '';
  document.getElementById('findCount').textContent = '';
  restoreSnapshot();
  findResults = []; findIdx = 0; findQuery = '';
}

/* Save a clean copy of the editor HTML (without marks) */
function takeSnapshot() {
  editorSnapshot = editor.innerHTML;
}

/* Re-inject snapshot (removes marks) and restore text cursor roughly */
function restoreSnapshot() {
  if (!editorSnapshot) return;
  isMarking = true;
  editor.innerHTML = editorSnapshot;
  editorSnapshot = '';
  isMarking = false;
}

/* Escape regex special chars */
function escRe(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

/* Build marked HTML from snapshot + current query */
function buildMarkedHTML(html, q) {
  if (!q) return html;
  const re = new RegExp('(' + escRe(q) + ')', 'gi');
  // Only replace inside text nodes, NOT inside tag attributes
  // Strategy: split on tags, mark only text segments
  return html.replace(/(<[^>]*>)|([^<]+)/g, (match, tag, text) => {
    if (tag) return tag; // preserve tags untouched
    return text.replace(re, '<mark class="find-hl">$1</mark>');
  });
}

function doFind() {
  const q = document.getElementById('findInp').value;
  findQuery = q;
  findResults = []; findIdx = 0;

  // Take fresh snapshot before any marking
  if (!editorSnapshot) takeSnapshot();

  // Reset to clean HTML first
  isMarking = true;
  editor.innerHTML = editorSnapshot;
  isMarking = false;

  if (!q) {
    document.getElementById('findCount').textContent = '';
    editorSnapshot = '';
    return;
  }

  // Inject marks into innerHTML
  const marked = buildMarkedHTML(editorSnapshot, q);
  isMarking = true;
  editor.innerHTML = marked;
  isMarking = false;

  // Collect live mark elements
  findResults = Array.from(editor.querySelectorAll('mark.find-hl'));

  const cnt = document.getElementById('findCount');
  if (findResults.length) {
    findIdx = 0;
    highlightCurrent();
  } else {
    cnt.textContent = 'Не знайдено';
  }
}

function highlightCurrent() {
  findResults.forEach((m, i) => m.classList.toggle('current', i === findIdx));
  const cur = findResults[findIdx];
  if (cur) {
    cur.scrollIntoView({ block: 'center', behavior: 'smooth' });
    document.getElementById('findCount').textContent = `${findIdx + 1} / ${findResults.length}`;
  }
}

function findStep(dir) {
  if (!findResults.length) return;
  findIdx = (findIdx + dir + findResults.length) % findResults.length;
  highlightCurrent();
}

function findKey(e) {
  if (e.key === 'Enter') { e.shiftKey ? findStep(-1) : findStep(1); }
  if (e.key === 'Escape') closeFindBar();
}

function replaceOne() {
  const q = document.getElementById('findInp').value;
  const rep = document.getElementById('replaceInp').value;
  if (!q || !editorSnapshot) return;

  // Replace first occurrence in snapshot text (case-insensitive)
  const re = new RegExp(escRe(q), 'i');
  const newSnap = editorSnapshot.replace(/(<[^>]*>)|([^<]+)/g, (match, tag, text) => {
    if (tag) return tag;
    if (re.test(text)) {
      // replace only the first match in this text segment
      return text.replace(re, rep);
    }
    return text;
  });

  if (newSnap === editorSnapshot) {
    document.getElementById('findCount').textContent = 'Не знайдено';
    return;
  }

  editorSnapshot = newSnap;
  tick();
  // Re-run find to refresh marks
  doFind();
}

function replaceAll() {
  const q = document.getElementById('findInp').value;
  const rep = document.getElementById('replaceInp').value;
  if (!q || !editorSnapshot) return;

  const re = new RegExp(escRe(q), 'gi');
  const newSnap = editorSnapshot.replace(/(<[^>]*>)|([^<]+)/g, (match, tag, text) => {
    if (tag) return tag;
    return text.replace(re, rep);
  });

  const count = (editorSnapshot.match(/(<[^>]*>)|([^<]+)/g) || [])
    .filter(s => !s.startsWith('<'))
    .reduce((acc, t) => acc + (t.match(re) || []).length, 0);

  editorSnapshot = newSnap;
  // Clear marks and show final result
  isMarking = true;
  editor.innerHTML = editorSnapshot;
  isMarking = false;
  editorSnapshot = '';
  findResults = []; findIdx = 0;
  document.getElementById('findCount').textContent = count > 0 ? `Замінено: ${count}` : 'Не знайдено';
  tick();
}

/* ══ EVENTS ══ */
editor.addEventListener('input', () => { if (!isMarking) { editorSnapshot = ''; tick(); } });
editor.addEventListener('mouseup', syncState);
editor.addEventListener('keyup', syncState);
editor.addEventListener('keydown', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  const k = e.key.toLowerCase();
  if (k === 'b') { e.preventDefault(); exec('bold'); }
  if (k === 'i') { e.preventDefault(); exec('italic'); }
  if (k === 'u') { e.preventDefault(); exec('underline'); }
  if (k === 'f') { e.preventDefault(); toggleFindBar(); }
  if (k === 'z' || k === 'y') setTimeout(syncState, 60);
});

editor.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      // Capture cursor NOW before anything steals focus
      const sel = window.getSelection();
      let pasteRange = null;
      if (sel && sel.rangeCount && editor.contains(sel.getRangeAt(0).commonAncestorContainer)) {
        pasteRange = sel.getRangeAt(0).cloneRange();
      }
      const file = item.getAsFile();
      const reader = new FileReader();
      reader.onload = ev => {
        const wrap = createImgWrap(ev.target.result, '100%', 'img-center');
        const p = document.createElement('p');
        p.style.textAlign = 'center';
        p.appendChild(wrap);

        if (pasteRange) {
          pasteRange.collapse(false);
          pasteRange.insertNode(p);
          const after = document.createRange();
          after.setStartAfter(p);
          after.collapse(true);
          const s = window.getSelection();
          s.removeAllRanges();
          s.addRange(after);
        } else {
          editor.appendChild(p);
        }
        selectWrap(wrap);
        tick();
      };
      reader.readAsDataURL(file);
    }
  }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.img-wrap') && !e.target.closest('.img-toolbar')) {
    deselectAll();
  }
});

document.getElementById('scrollArea').addEventListener('click', e => {
  if (!e.target.closest('.editor') && !e.target.closest('.img-toolbar')) editor.focus();
});

document.getElementById('docTitle').addEventListener('input', scheduleSave);

/* ══ GLOBAL HOTKEYS ══ */
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'f') {
    e.preventDefault();
    toggleFindBar();
  }
  if (e.key === 'Escape') {
    if (document.getElementById('findBar').classList.contains('open')) closeFindBar();
    if (document.body.classList.contains('focus-mode')) toggleFocus();
  }
});

/* ══ INIT ══ */
loadSaved();
editor.focus();
buildToc();
</script>
</body>
</html>
